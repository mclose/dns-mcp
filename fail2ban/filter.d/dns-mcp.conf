# Fail2Ban filter for DNS MCP proxy
# Matches any 4xx response with X-Forwarded-For IP
# Install Location: /etc/fail2ban/filter.d/dns-mcp.conf

[Definition]

# Match format: 127.0.0.1 [XFF: 1.2.3.4] ... "GET /path HTTP/1.1" 4xx
failregex = ^127\.0\.0\.1 \[XFF: <HOST>\] .* \"(GET|POST|HEAD|PUT|DELETE|PATCH|OPTIONS) .* HTTP.*\" 4\d\d

ignoreregex =
