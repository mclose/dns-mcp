name: CI

on:
  push:
    branches: ["main", "remote"]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pre-commit/action@v3.0.1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: make build

      - name: Unit tests (pytest)
        run: make test

      - name: End-to-end (stdio)
        run: ./test-mcp-stdio.sh
